name: cut_optimizer
description: CutOptimizer Pro - 2D panel cut optimization for wood, glass, and sheet materials.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  pdf: ^3.10.7
  printing: ^5.12.0
  screenshot: ^2.1.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
