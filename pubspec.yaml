name: cut_optimizer
description: CutOptimizer Pro - 2D panel cut optimization for wood, glass, and sheet materials.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # File picking & saving
  file_picker: ^6.1.1
  path_provider: ^2.1.2

  # JSON
  # (dart:convert is built-in)

  # Share / export
  share_plus: ^7.2.1
  flutter_email_sender: ^6.0.3

  # PDF generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Image capture (for export)
  screenshot: ^2.1.0

  # Local storage (save/load projects)
  shared_preferences: ^2.2.2

  # UUID for panel IDs
  uuid: ^4.3.3

  # Google Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
